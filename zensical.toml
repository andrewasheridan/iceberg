[project]
site_name = "sheridan-iceberg"
site_description = "Enforce __all__ correctness in Python modules"
repo_url = "https://github.com/sheridan/sheridan-iceberg"
repo_name = "sheridan/sheridan-iceberg"
docs_dir = "docs"
site_dir = "site"
nav = [
  {"Home" = "index.md"},
  {"API Reference" = [
    {"iceberg" = "api/api.md"},
  ]},
]

[project.theme]
variant = "classic"

[project.plugins.search]

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = true
show_root_heading = true
members_order = "source"
