version: "3"

vars:
  # Resolve DOCKER_HOST for Dagger based on CONTAINER_RUNTIME (default: podman).
  # To use Docker instead: CONTAINER_RUNTIME=docker task ci
  DAGGER_DOCKER_HOST:
    sh: |
      rt="${CONTAINER_RUNTIME:-podman}"
      if [ "$rt" = "docker" ]; then
        printf '%s' "${DOCKER_HOST:-}"
      else
        # macOS: Podman machine symlinks its socket to /var/run/docker.sock
        # Linux: use the systemd user socket
        if [ -S "/var/run/docker.sock" ]; then
          printf 'unix:///var/run/docker.sock'
        else
          printf 'unix:///run/user/%s/podman/podman.sock' "$(id -u)"
        fi
      fi

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  install:
    desc: Install all dependencies
    cmds:
      - uv sync --all-extras --dev

  lint:
    desc: Run ruff linter and autofix issues
    cmds:
      - uv run ruff check --fix .

  lint:check:
    desc: Run ruff linter (check only, no fixes)
    cmds:
      - uv run ruff check .

  format:
    desc: Run ruff formatter
    cmds:
      - uv run ruff format .

  format:check:
    desc: Check formatting without writing
    cmds:
      - uv run ruff format --check .

  typecheck:
    desc: Run mypy strict type checking
    cmds:
      - uv run mypy --strict src/

  test:
    desc: Run pytest with coverage
    cmds:
      - uv run pytest --cov {{.CLI_ARGS}}

  iceberg:
    desc: Run iceberg on itself (dogfood — show public API)
    cmds:
      - uv run iceberg src/ {{.CLI_ARGS}}

  check:
    desc: Run all gates (lint:check, format:check, typecheck, test, iceberg)
    cmds:
      - task: lint:check
      - task: format:check
      - task: typecheck
      - task: test
      - task: iceberg

  ci-init:
    desc: Initialise the Dagger module (run once; generates ci/sdk/ and pins engineVersion)
    summary: |
      Uses podman by default. Override with: CONTAINER_RUNTIME=docker task ci-init

      Podman socket must be active before running:
        systemctl --user enable --now podman.socket   # Linux
        podman machine start                          # macOS
    env:
      DOCKER_HOST: "{{.DAGGER_DOCKER_HOST}}"
    cmds:
      - dagger develop

  ci:
    desc: Run CI pipeline via Dagger (podman default; CONTAINER_RUNTIME=docker for Docker)
    summary: |
      Uses podman by default. Override with: CONTAINER_RUNTIME=docker task ci

      Podman socket must be active before running:
        systemctl --user enable --now podman.socket   # Linux
        podman machine start                          # macOS
    env:
      DOCKER_HOST: "{{.DAGGER_DOCKER_HOST}}"
    cmds:
      - dagger call check --source=.

  docs:build:
    desc: Build Zensical documentation
    cmds:
      - cp README.md docs/index.md
      - uv run zensical build

  docs:serve:
    desc: Serve Zensical documentation locally
    cmds:
      - cp README.md docs/index.md
      - uv run zensical serve

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist/ .coverage htmlcov/ .mypy_cache/ .ruff_cache/ __pycache__/
      - find . -type d -name __pycache__ -exec rm -rf {} +
      - find . -type f -name "*.pyc" -delete
