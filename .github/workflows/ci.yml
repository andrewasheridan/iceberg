name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: All gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run CI pipeline
        uses: dagger/dagger-action@v3
        with:
          verb: call
          args: check --source=.
