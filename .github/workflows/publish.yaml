# Publish sheridan-diffract to PyPI on version tag push.
#
# Prerequisites — register this repo as a trusted publisher on pypi.org:
#   pypi.org → Account Settings → Publishing → Add a new pending publisher
#     Owner:      andrewasheridan
#     Repository: diffract
#     Workflow:   publish.yaml
#     Environment: pypi   (must match the `environment:` name on the publish job)
#
# Once registered, PyPI trusts GitHub's OIDC token — no API token secrets needed.
#
# Triggered by tag-on-merge.yaml pushing a v* tag. Using push.tags (not
# workflow_call) so GitHub issues a first-party OIDC token — workflow_call
# produces a reusable-workflow token that PyPI's trusted publisher rejects.

name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:  # Allows manual re-runs via gh CLI or UI

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v7

      - name: Build sdist and wheel
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sheridan-iceberg
    permissions:
      contents: read
      id-token: write  # required for OIDC trusted publishing

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
