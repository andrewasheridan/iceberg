# Publish sheridan-iceberg to PyPI on version tag push.
#
# Prerequisites — register this repo as a trusted publisher on pypi.org:
#   pypi.org → Account Settings → Publishing → Add a new pending publisher
#     Owner:      andrewasheridan
#     Repository: iceberg
#     Workflow:   publish.yaml
#     Environment: pypi   (must match the `environment:` name on the publish job)
#
# Once registered, PyPI trusts GitHub's OIDC token — no API token secrets needed.

name: Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v5

      - name: Build sdist and wheel
        run: uvx build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sheridan-iceberg
    permissions:
      contents: read
      id-token: write  # required for OIDC trusted publishing

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
