name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: All gates
    runs-on: ubuntu-latest
    if: |
      !startsWith(github.event.head_commit.message, 'bump:') &&
      !startsWith(github.head_ref, 'chore/version-bump-')
    steps:
      - uses: actions/checkout@v6

      - name: Restore Dagger engine cache
        id: cache-dagger
        uses: actions/cache@v5
        with:
          path: /tmp/dagger-engine.tar
          key: dagger-engine-v0.20.3

      - name: Load Dagger engine image
        if: steps.cache-dagger.outputs.cache-hit == 'true'
        run: docker load -i /tmp/dagger-engine.tar

      - name: Run CI pipeline
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: "0.20.3"
          call: check --source=.

      - name: Save Dagger engine image
        if: steps.cache-dagger.outputs.cache-hit != 'true'
        run: docker save registry.dagger.io/engine:v0.20.3 -o /tmp/dagger-engine.tar
