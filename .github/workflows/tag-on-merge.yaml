# When a version-bump PR is squash-merged into main, create an annotated tag on
# the merge commit. publish.yaml listens for the resulting tag push and handles
# the PyPI release — workflow_call cannot be used because it produces a
# reusable-workflow OIDC token that PyPI's trusted publisher rejects.
#
# RELEASE_TOKEN is passed to actions/checkout so that checkout's git credential
# helper is wired to the PAT rather than GITHUB_TOKEN. Without this, the helper
# installed by checkout overrides any credential embedded in the remote URL, the
# push is attributed to GITHUB_TOKEN, and GitHub suppresses the push.tags event
# that publish.yaml depends on.

name: Tag on merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  tag-merge-commit:
    name: Tag merge commit
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'chore/version-bump-')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}   # wire credential helper to PAT so tag push triggers publish.yaml

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract version from branch name
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#chore/version-bump-}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          VERSION: ${{ steps.extract.outputs.version }}
        run: |
          git tag -a "v$VERSION" "${{ github.event.pull_request.merge_commit_sha }}" -m "Version $VERSION"
          git push origin "v$VERSION"
