name: Bump version

on:
  push:
    branches: [main]

jobs:
  bump:
    name: Commitizen bump
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check for bump commit (infinite loop guard)
        id: guard
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$HEAD_MSG" == bump:* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip == 'false'
        with:
          fetch-depth: 0

      - name: Set up Python 3.14
        if: steps.guard.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        if: steps.guard.outputs.skip == 'false'
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        if: steps.guard.outputs.skip == 'false'
        run: uv sync --all-extras --dev

      - name: Configure git identity
        if: steps.guard.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        if: steps.guard.outputs.skip == 'false'
        id: bump
        run: |
          set +e
          uv run cz bump --yes
          code=$?
          set -e
          if [[ $code -eq 0 ]]; then
            NEW_VERSION=$(uv run python -c "import tomllib; f=open('pyproject.toml','rb'); d=tomllib.load(f); print(d['project']['version'])")
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          elif [[ $code -eq 21 ]]; then
            echo "No releasable commits — nothing to bump."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            echo "cz bump failed with exit code $code."
            exit $code
          fi
        env:
          FORCE_COLOR: "1"

      - name: Push bump branch
        if: steps.guard.outputs.skip == 'false' && steps.bump.outputs.bumped == 'true'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          git checkout -b "chore/version-bump-$NEW_VERSION"
          git push origin "chore/version-bump-$NEW_VERSION"

      - name: Open and auto-merge version bump PR
        if: steps.guard.outputs.skip == 'false' && steps.bump.outputs.bumped == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          gh pr create \
            --title "bump: $NEW_VERSION" \
            --body "Automated version bump to $NEW_VERSION generated by Commitizen." \
            --base main \
            --head "chore/version-bump-$NEW_VERSION"
          gh pr edit "chore/version-bump-$NEW_VERSION" --add-label automated || true
          gh pr merge "chore/version-bump-$NEW_VERSION" --squash --auto
